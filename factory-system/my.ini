# Small-system example (modified - 2025-11-25)
[client]
port=3306
socket="C:/xampp/mysql/mysql.sock"

[mysqld]
port=3306
socket="C:/xampp/mysql/mysql.sock"
basedir="C:/xampp/mysql"
tmpdir="C:/xampp/tmp"                     # keep, or set to a path excluded from AV e.g. C:/mysqltmp
datadir="C:/xampp/mysql/data"
pid_file="C:/xampp/mysql/data/mysql.pid"  # made absolute for clarity
key_buffer=16M
max_allowed_packet=1M
sort_buffer_size=512K
net_buffer_length=8K
read_buffer_size=256K
read_rnd_buffer_size=512K
myisam_sort_buffer_size=8M
log_error="C:/xampp/mysql/data/mysql_error.log"  # made absolute
plugin_dir="C:/xampp/mysql/lib/plugin/"

server-id = 1

# InnoDB settings
innodb_data_home_dir="C:/xampp/mysql/data"
innodb_data_file_path=ibdata1:10M:autoextend
innodb_temp_data_file_path=ibtmp1:12M:autoextend     # explicit temp tablespace setting
innodb_log_group_home_dir="C:/xampp/mysql/data"
innodb_buffer_pool_size=16M         # keep for very small systems; increase if you have >=1GB RAM
innodb_log_file_size=5M
innodb_log_buffer_size=8M
innodb_flush_log_at_trx_commit=1
innodb_lock_wait_timeout=50
innodb_flush_method=normal          # recommended on Windows

sql_mode=NO_ZERO_IN_DATE,NO_ZERO_DATE,NO_ENGINE_SUBSTITUTION
log_bin_trust_function_creators=1

character-set-server=utf8mb4
collation-server=utf8mb4_general_ci

[mysqldump]
max_allowed_packet=16M

[mysql]
#safe-updates

[isamchk]
key_buffer=20M
sort_buffer_size=20M
read_buffer=2M
write_buffer=2M

[myisamchk]
key_buffer=20M
sort_buffer_size=20M
read_buffer=2M
write_buffer=2M
