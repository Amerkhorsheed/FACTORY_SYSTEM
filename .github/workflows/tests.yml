name: Tests

on:
  push:
    branches:
      - master
      - main
      - '*.x'
  pull_request:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3]

    name: PHP ${{ matrix.php }}

    defaults:
      run:
        working-directory: factory-system

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: factory-system/package-lock.json

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install NPM dependencies
        run: npm ci

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Audit Composer dependencies
        run: composer audit --no-interaction

      - name: Audit production NPM dependencies
        run: npm audit --omit=dev

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Check PHP formatting
        run: vendor/bin/pint --test

      - name: Build frontend assets
        run: npm run build

      - name: Verify Laravel cacheability
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan event:cache
          php artisan optimize:clear

      - name: Run deployment preflight
        run: php artisan factory:preflight

      - name: Execute tests
        run: vendor/bin/phpunit
